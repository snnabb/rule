mode: rule
mixed-port: 7890
allow-lan: true
ipv6: true
tcp-concurrent: true
unified-delay: true
find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

proxies: []

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-dns-mapping: true
  parse-pure-ip: true
  skip-domain:
    - Mijia Cloud
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  prefer-h3: false
  cache-algorithm: arc
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.market.xiaomi.com"
    - "+.miwifi.com"
    - "+.push.apple.com"
    - Mijia Cloud
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  nameserver-policy:
    geosite:private:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    geosite:cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true

proxy-groups:
  - name: Proxy
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
  - name: Smart
    type: select
    proxies: [Smart Auto, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
  - name: Apple
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
  - name: AI
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png
  - name: Telegram
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
  - name: Google
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png
  - name: Streaming
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
  - name: Microsoft
    type: select
    proxies: [Smart, HK Auto, TW Auto, JP Auto, SG Auto, US Auto, All Nodes, DIRECT]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png
  - name: Smart Auto
    type: url-test
    proxies: [HK Auto, TW Auto, JP Auto, SG Auto, US Auto]
    url: https://cp.cloudflare.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
  - name: All Nodes
    type: select
    include-all: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Node.png
  - name: HK Auto
    type: url-test
    include-all: true
    filter: 香港|港|HK|Hong\s?Kong|HKG|🇭🇰
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
  - name: TW Auto
    type: url-test
    include-all: true
    filter: 台湾|台|TW|Taiwan|TPE|KHH|🇹🇼
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
  - name: JP Auto
    type: url-test
    include-all: true
    filter: 日本|日|JP|Japan|Tokyo|Osaka|NRT|HND|🇯🇵
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
  - name: SG Auto
    type: url-test
    include-all: true
    filter: 新加坡|坡|狮城|SG|Singapore|SIN|🇸🇬
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
  - name: US Auto
    type: url-test
    include-all: true
    filter: 美国|美|US|USA|United\s?States|Los\s?Angeles|San\s?Jose|LAX|SJC|JFK|🇺🇸
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    hidden: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

