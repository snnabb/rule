# ====== 通用 filter 锚点（减少重复） ======
cf: &cf "(?i)^(?!.*(剩余|重置|到期|流量|Traffic|Expire|Reset)).+"
proxy-groups:
  # 顶层总选择：包含全部节点 + 常用选项
  - name: Selection
    type: select
    include-all: true
    filter: *cf
    proxies: ['♻️ Auto', 'DIRECT']
  # 自动测速池：自动在"全部节点"中选更快的
  - name: '♻️ Auto'
    type: url-test
    include-all: true
    filter: *cf
    url: 'http://connectivitycheck.gstatic.com/generate_204'
    interval: 600
    timeout: 1500
    tolerance: 50
  - name: '🍎 Apple'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '📲 Telegram'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '♻️ Auto', 'DIRECT']
  - name: '🎬 YouTube'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '🔗 Chain', '♻️ Auto', 'DIRECT']
  - name: '🎬 BiliBili'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '🤖 AI'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '🔗 Chain', '♻️ Auto', 'DIRECT']
  - name: '🎵 TikTok'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '🔗 Chain', '♻️ Auto', 'DIRECT']
  - name: '💿 Spotify'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '📺 Netflix'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '🔗 Chain', '♻️ Auto', 'DIRECT']
  - name: '📺 Disney'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '🔗 Chain', '♻️ Auto', 'DIRECT']
  - name: '🌐 Google'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '🔗 Chain', '♻️ Auto', 'DIRECT']
  - name: '☁️ OneDrive'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '🖥 Microsoft'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '📟 Twitter'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '♻️ Auto', 'DIRECT']
  - name: '📺 GlobalMedia'
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, '♻️ Auto', 'DIRECT']
  - name: '🎬 Emby'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '🎮 Games'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: '💀 Hijacking'
    type: select
    proxies: ['DIRECT', 'REJECT']
  - name: '🇨🇳 ChinaWebsites'
    type: select
    include-all: true
    filter: *cf
    proxies: ['DIRECT', Selection, '♻️ Auto']
  - name: Final
    type: select
    include-all: true
    filter: *cf
    proxies: [Selection, 'DIRECT', '♻️ Auto', 'REJECT']
rule-providers:
  Apple:          { type: http, url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple_Classical.yaml',                   interval: 86400, proxy: Selection, behavior: classical }
