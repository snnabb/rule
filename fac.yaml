rules:
  - 'DOMAIN,emby.diom.qzz.io,DIRECT'
  - 'PROCESS-NAME,cloudflared.exe,DIRECT'
  - 'DOMAIN-SUFFIX,argotunnel.com,DIRECT'
  - 'DOMAIN-SUFFIX,cftunnel.com,DIRECT'
  - 'DOMAIN-SUFFIX,micu.hk,DIRECT'
  - 'RULE-SET,Telegram,📲 Telegram'
  - 'RULE-SET,YouTube,🎬 YouTube'
  - 'DOMAIN-SUFFIX, openai.com,🤖 AI'
  - 'RULE-SET,OpenAI,🤖 AI'
  - 'RULE-SET,Gemini,🤖 AI'
  - 'RULE-SET,Claude,🤖 AI'
  - 'RULE-SET,OneDrive,☁️ OneDrive'
  - 'DOMAIN-SUFFIX,microsoftpersonalcontent.com,☁️ OneDrive'
  - 'RULE-SET,Microsoft,🖥 Microsoft'
  - 'RULE-SET,LinkedIn,🖥 Microsoft'
  - 'RULE-SET,Google,🌐 Google'
  - 'RULE-SET,Apple,🍎 Apple'
  - 'RULE-SET,Twitter,📟 Twitter'
  - 'RULE-SET,BiliBili,🎬 BiliBili'
  - 'RULE-SET,TikTok,🎵 TikTok'
  - 'RULE-SET,Spotify,💿 Spotify'
  - 'RULE-SET,Netflix,📺 Netflix'
  - 'RULE-SET,Disney,📺 Disney'
  - 'RULE-SET,GameDownload,🎮 Games'
  - 'RULE-SET,GameDownloadCN,🎮 Games'
  - 'RULE-SET,HoYoverse,🎮 Games'
  - 'RULE-SET,Steam,🎮 Games'
  - 'RULE-SET,SteamCN,🎮 Games'
  - 'RULE-SET,Emby,🎬 Emby'
  - 'RULE-SET,GlobalMedia,📺 GlobalMedia'
  - 'RULE-SET,ChinaMax,🇨🇳 ChinaWebsites'
  - 'RULE-SET,Hijacking,💀 Hijacking'
  - 'GEOIP,CN,🇨🇳 ChinaWebsites'
  - 'MATCH,Final'
